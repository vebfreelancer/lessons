<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM%20Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/reset.css">
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
        }
        h1 {
            font-weight: 400;
            font-size: 50px;
            letter-spacing: -1.26px;
            color: #131313;
        }
        h1 span {
            font-weight: 700;
            color: #1AAF5B;
        }
        p {
            font-size: 20px;
            line-height: 28px;
            letter-spacing: -0.5px;
            color: #000;
        }
    </style>
</head>
<body>
    <div>
        <h1>Grown <span>by Nature</span></h1>
        <p>
            We grow our crops naturally. We are a fast-growing agricultural technology company passionate about ensuring food security. We leverage our technology to improve productivity & sales to promote food security for you and your family.
        </p>
    </div>
</body>
</html>
